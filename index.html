<head>
<title>NC Viewer | Free Online G-Code Viewer & Simulator by NCnetic</title>
<meta name="description" content="Free online G-code viewer and simulator to load, visualize, edit, and inspect CNC programs directly in your browser. No installation required.">
<meta name="keywords" content="g-code viewer, cnc simulator, nc viewer, gcode editor, cnc viewer, ncnetic">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
  <style>
  
      :root {
      --bg-header: #f5f5f5;
      --text-header: #222;
      --bg-editor: #ffffff;
      --text-editor: #000000;
      --bg-viewer: #eeeeee;
      --text-viewer: #222;
      --bg-resizer: #ccc;
      --btn-bg: #ddd;
      --scrollbar-bg: #ddd;
      --scrollbar-thumb: #aaa;
      --viewer-bg-color: #eeeeee;
    }
	
    body.light {
      --bg-header: #222;
      --text-header: white;
      --bg-editor: #1e1e1e;
      --text-editor: #d4d4d4;
      --bg-viewer: #2c2c2c;
      --text-viewer: white;
      --bg-resizer: #555;
      --btn-bg: #444;
      --scrollbar-bg: #555;
      --scrollbar-thumb: #888;
      --viewer-bg-color: #2c2c2c;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      overflow: hidden;
    }

    header {
      height: 50px;
      background-color: var(--bg-header);
      color: var(--text-header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    header .left, header .right {
      display: flex;
      align-items: center;
      gap: 15px;
	  justify-content: space-between;
    }

    header button {
      background: var(--btn-bg);
      color: var(--text-header);
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 14px;
    }

	.examples-dropdown {
	  position: relative;
	  display: inline-block;
	}
	.examples-menu {
	  position: absolute;
	  top: calc(100% + 4px);
	  left: 0;
	  background: var(--bg-header);
	  color: var(--text-header);
	  border: 1px solid var(--bg-resizer);
	  list-style: none;
	  margin: 0;
	  padding: 4px 0;
	  min-width: 200px;
	  z-index: 10;
	  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
	}
	.examples-menu li {
	  padding: 6px 12px;
	  cursor: pointer;
	  font-family: monospace;
	  font-size: 13px;
	}
	.examples-menu li:hover {
	  background: var(--btn-bg);
	}
	
	.right svg {
	  max-height: 40px; 
	}
	
	.ncnetic-link {
	  color: inherit;
	}
	
	.separator {
	  margin: 0 10px;
	  color: #888;
	}

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 50px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      border-radius: 50px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:checked + .slider:before {
      transform: translateX(14px);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--scrollbar-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    main {
      display: flex;
      height: calc(100% - 50px);
      width: 100%;
      overflow: auto;
    }

    .editor {
      width: 30%;
      flex-shrink: 0;
      flex-grow: 0;
      background: var(--bg-editor);
      color: var(--text-editor);
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

	.monaco-scrollable-element > .scrollbar > .slider {
	  border-radius: 4px;
	  background: var(--scrollbar-thumb, #888);
	  box-shadow: none;
	}
	.monaco-scrollable-element > .scrollbar > .slider::before {
	  display: none;
	}
	
	.myLineHighlight {
		background-color: rgba(100, 180, 255, 0.2);
	}

    .resizer {
      width: 8px;
      background: var(--bg-resizer);
      cursor: col-resize;
    }

	.viewer {
	  flex: 1 1 auto;
	  min-width: 100px;
	  background: var(--bg-viewer);
	  color: var(--text-viewer);
	  position: relative;
	  display: flex;
	  flex-direction: column;
	  justify-content: flex-end;
	  font-size: 1.2rem;
	}

	.viewer-info {
	  position: absolute;
	  top: 10px;
	  right: 10px;
	  z-index: 1;

	  display: flex;
	  flex-direction: column;
	  align-items: flex-start;

	  padding: 8px 12px;
	  background-color: rgba(0, 0, 0, 0.3);
	  color: var(--text-viewer);
	  font-family: monospace;
	  font-size: 0.85rem;

	  border: 1px solid rgba(255, 255, 255, 0.2);
	  border-radius: 4px;
	  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
	}
	.viewer-info span {
	  margin-bottom: 4px;
	}
	.viewer-info span.dro-gap {
	  margin-top: 0.5rem;
	}
	.viewer-info.viewer-info-left {
	  right: auto;
	  left: 10px;
	}

	.tools-panel {
	  margin-top: 10px;
	  flex-shrink: 0;
	  max-height: 30%;
	  overflow-y: auto;
	  font-size: 0.85rem;
	  color: var(--text-editor);
	  font-family: monospace;
	}
	.tools-panel table {
	  width: 100%;
	  border-collapse: collapse;
	}
	.tools-panel th, .tools-panel td {
	  padding: 4px 8px;
	  text-align: left;
	  border-bottom: 1px solid var(--bg-resizer);
	}
	.tools-panel th {
	  font-size: 0.75rem;
	  text-transform: uppercase;
	  opacity: 0.7;
	}
	
	#viewer {
		position: relative;
		width: 100%;
	}

	#viewerSlider {
		position: absolute;
		bottom: 10px;
		left: 10px;
		left: 50%;
		transform: translateX(-50%);
		width: 60%;
		height: 10px;
		background-color: #ddd;
		-webkit-appearance: none;
		appearance: none;
		border-radius: 5px;
		outline: none;
	}

	#viewerSlider::-webkit-slider-thumb {
		-webkit-appearance: none;
		appearance: none;
		width: 20px;
		height: 20px;
		background-color: #007bff;
		border-radius: 50%;
		cursor: pointer;
	}

	#viewerSlider::-moz-range-thumb {
		width: 20px;
		height: 20px;
		background-color: #007bff;
		border-radius: 50%;
		cursor: pointer;
	}

    @media (max-width: 768px) {
      .resizer,
      .viewer {
        display: none;
      }

      .editor {
        width: 100%;
      }
    }

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.173.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/",

<script type="module">

	import * as THREE from "three";

	import {
		ViewportGizmo
	}
	from "three-viewport-gizmo";

	import {
		OrbitControls
	}
	from "three/addons/controls/OrbitControls.js";

	const viewer = document.getElementById('viewer');
	const scene = new THREE.Scene();
	scene.up.set(0, 0, 1);
	const segmentsGroup = new THREE.Group();
	scene.add(segmentsGroup);

	const aspect = viewer.clientWidth / viewer.clientHeight;
	const f0 = 20000;
	const camera = new THREE.OrthographicCamera(
			-f0 * aspect / 2,
			f0 * aspect / 2,
			f0 / 2,
			-f0 / 2,
			0.1,
			2 * f0);
	camera.up.set(0, 0, 1);

	const renderer = new THREE.WebGLRenderer();
	renderer.setSize(viewer.clientWidth, viewer.clientHeight);
	viewer.appendChild(renderer.domElement);

	const setViewerBackground = () => {
		const bgColor = getComputedStyle(document.body).getPropertyValue('--viewer-bg-color').trim();
		renderer.setClearColor(new THREE.Color(bgColor));
	};

	setViewerBackground();

	const controls = new OrbitControls(camera, renderer.domElement);
	controls.mouseButtons = {
		LEFT: THREE.MOUSE.PAN,
		MIDDLE: THREE.MOUSE.ROTATE,
		RIGHT: null
	};
	controls.screenSpacePanning = true;

	const gizmo = new ViewportGizmo(camera, renderer, {
		placement: 'bottom-right'
	});
	gizmo.attachControls(controls);

	const raycaster = new THREE.Raycaster();
	const mouse = new THREE.Vector2();

	let isMouseDown = false;
	let mouseDownPosition = { x: 0, y: 0 };

	renderer.domElement.addEventListener('mousedown', (event) => {
		isMouseDown = true;
		mouseDownPosition.x = event.clientX;
		mouseDownPosition.y = event.clientY;
	});

	renderer.domElement.addEventListener('mouseup', (event) => {
		if (!isMouseDown) return;
		isMouseDown = false;

		const dx = event.clientX - mouseDownPosition.x;
		const dy = event.clientY - mouseDownPosition.y;
		const distanceSquared = dx * dx + dy * dy;

		const clickThreshold = 5 * 5;

		if (distanceSquared <= clickThreshold) {
			const rect = renderer.domElement.getBoundingClientRect();
			mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
			mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

			raycaster.params.Line.threshold = size / 100 / camera.zoom;

			raycaster.setFromCamera(mouse, camera);
			const intersects = raycaster.intersectObject(lineSegmentsMesh, false);

			if (intersects.length > 0) {
				const intersect = intersects[0];
				const faceIndex = intersect.index;
				const segmentIndex = Math.floor(faceIndex / 2);

				const movement = movements[segmentIndex + 1];
				const lineIdx = movement.lineNumber;

				highlightEditorLine(lineIdx);
				slider.value = segmentIndexToSliderValue(segmentIndex);

				const { startIdx, endIdx } = expandToLineNumberRange(segmentIndex);
				selectLineSegments(startIdx, endIdx);
				
			} else {
				slider.value = 0;
				selectLineSegments(movements.length, movements.length);
			}
		}
	});

	let size = 0;

	function getNonEmptySegmentBox() {
		const box = new THREE.Box3().setFromObject(segmentsGroup);
		if (box.isEmpty()) {
			return new THREE.Box3(
				new THREE.Vector3(-1, -1, -1),
				new THREE.Vector3(1, 1, 1)
			);
		}
		return box;
	}

	function resetCamera() {
		const box = getNonEmptySegmentBox();

		size = box.getSize(new THREE.Vector3()).length();
		const center = box.getCenter(new THREE.Vector3());

		const f = size * 1.1;
		camera.left = -f * aspect / 2;
		camera.right = f * aspect / 2;
		camera.top = f / 2;
		camera.bottom = -f / 2;
		camera.zoom = 1;
		camera.updateProjectionMatrix();

		camera.position.set(center.x + size * 1.5, center.y - size * 1.5, size * 0.7);
		camera.lookAt(center);

		controls.target.copy(center);
		controls.update();

		addAxisLines(box);
		addAxisTicks(box);
		addGridLines(box);
	}

	const loadBtn = document.getElementById('loadBtn');
	const fileInput = document.getElementById('fileInput');

	let monacoEditor;
	require.config({
		paths: {
			vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs"
		}
	});
	require(["vs/editor/editor.main"], function () {
		monacoEditor = monaco.editor.create(document.getElementById("codeEditor"), {
			value: `
Welcome to nc-viewer.ncnetic!

This web app allows you to simulate 
and edit simple G-code files.

For more complex G-code programs, 
advanced simulation environments, 
and professional-grade solutions, 

please visit our website:
https://ncnetic.com

Enjoy!
`,
			language: "plaintext",
			theme: document.body.classList.contains('light') ? "vs-dark" : "vs-light",
			fontSize: 14,
			lineNumbers: "on",
			wordWrap: "off",
			automaticLayout: true,
			glyphMargin: false,
			lineDecorationsWidth: 0,
			overviewRulerLanes: 0,
			hideCursorInOverviewRuler: true,
			renderLineHighlight: 'none',
			selectionHighlight: false,
			wordHighlighter: false,
			occurrencesHighlight: false,
			minimap: {
				enabled: false
			},
			scrollbar: {
				vertical: 'auto',
				horizontal: 'auto',
				useShadows: false,
				verticalScrollbarSize: 8,
				horizontalScrollbarSize: 8,
				handleMouseWheel: true,
				alwaysConsumeMouseWheel: false
			}
		});
		
		monacoEditor.onDidChangeCursorPosition((e) => {
			const lineNumber = e.position.lineNumber;
			const targetLineIndex = lineNumber - 1;

			highlightEditorLine(targetLineIndex);

			let startIdx = -1;
			let endIdx = -1;

			for (let i = 1; i < movements.length; i++) {
				if (movements[i].lineNumber === targetLineIndex) {
					const segmentIdx = i - 1;
					if (startIdx === -1) startIdx = segmentIdx;
					endIdx = segmentIdx;
				}
			}

			if (startIdx !== -1 && endIdx !== -1) {
				slider.value = segmentIndexToSliderValue(endIdx);
				selectLineSegments(startIdx, endIdx);
			}
		});
	});

	let movements = [];
	let cumulativeLengths = [];
	let lineSegmentsMesh = null;
	let compensatedMesh = null;
	let arrowMesh = null;
	let arrowSegmentIndices = [];
	let arrowLength = 0;
	let loadedFilename = "gcode.txt";

	function segmentIndexToSliderValue(idx) {
		return cumulativeLengths[idx + 1] ?? 0;
	}

	function sliderValueToSegmentIndex(value) {
		if (cumulativeLengths.length < 2) return 0;
		let lo = 1, hi = cumulativeLengths.length - 1;
		while (lo < hi) {
			const mid = (lo + hi) >>> 1;
			if (cumulativeLengths[mid] < value) lo = mid + 1; else hi = mid;
		}
		return Math.max(0, Math.min(movements.length - 2, lo - 1));
	}

	function expandToLineNumberRange(segIdx) {
		if (segIdx + 1 >= movements.length) return { startIdx: segIdx, endIdx: segIdx };
		const lineIdx = movements[segIdx + 1].lineNumber;
		let startIdx = -1;
		let endIdx = -1;
		for (let i = 1; i < movements.length; i++) {
			if (movements[i].lineNumber === lineIdx) {
				const sIdx = i - 1;
				if (startIdx === -1) startIdx = sIdx;
				endIdx = sIdx;
			}
		}
		if (startIdx === -1) return { startIdx: segIdx, endIdx: segIdx };
		return { startIdx, endIdx };
	}

	function segmentHasArrow(mv) {
		if (mv.command === 'G0') return false;
		return mv.isMidpoint;
	}

	function buildArrowheads() {
		arrowSegmentIndices = [];
		const entries = [];
		const minConeSpacing = arrowLength * 30;
		let cumulativeSinceLastCone = minConeSpacing;

		for (let i = 1; i < movements.length; i++) {
			const mv = movements[i];

			if (mv.isMidpoint) cumulativeSinceLastCone += mv.feedLength;

			if (!segmentHasArrow(mv)) continue;
			if (cumulativeSinceLastCone < minConeSpacing) continue;

			const prev = movements[i - 1];
			const start = new THREE.Vector3(prev.X, prev.Y, prev.Z);
			const end = new THREE.Vector3(mv.X, mv.Y, mv.Z);
			const delta = new THREE.Vector3().subVectors(end, start);
			const segmentLength = delta.length();
			if (segmentLength === 0) continue;

			const direction = delta.divideScalar(segmentLength);
			const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
			entries.push({ midpoint, direction });
			arrowSegmentIndices.push(i - 1);

			cumulativeSinceLastCone = 0;
		}

		if (entries.length === 0) return;

		const geometry = new THREE.ConeGeometry(arrowLength * 0.4, arrowLength, 8);
		geometry.translate(0, -arrowLength / 2, 0);

		const material = new THREE.MeshBasicMaterial({
			color: 0xffffff,
			depthTest: false,
			transparent: true,
			opacity: 1.0
		});

		arrowMesh = new THREE.InstancedMesh(geometry, material, entries.length);
		arrowMesh.renderOrder = 1;

		const up = new THREE.Vector3(0, 1, 0);
		const quaternion = new THREE.Quaternion();
		const scale = new THREE.Vector3(1, 1, 1);
		const matrix = new THREE.Matrix4();
		const initColor = new THREE.Color(colors.feedColor);

		for (let i = 0; i < entries.length; i++) {
			quaternion.setFromUnitVectors(up, entries[i].direction);
			matrix.compose(entries[i].midpoint, quaternion, scale);
			arrowMesh.setMatrixAt(i, matrix);
			arrowMesh.setColorAt(i, initColor);
		}
		arrowMesh.instanceMatrix.needsUpdate = true;
		arrowMesh.instanceColor.needsUpdate = true;

		segmentsGroup.add(arrowMesh);
	}

	const COMP_EPSILON = 1e-6;

	function buildCompensatedMesh(compensated) {
		if (!compensated || compensated.length < 2) return;

		const positions = [];
		for (let k = 1; k < compensated.length; k++) {
			const a = compensated[k - 1];
			const b = compensated[k];

			const bOwner = movements[b.movement_i];
			const bStart = movements[b.movement_i - 1];
			const isLeadInStart = bStart
				&& Math.abs(b.X - bStart.X) < COMP_EPSILON
				&& Math.abs(b.Y - bStart.Y) < COMP_EPSILON
				&& Math.abs(b.Z - bStart.Z) < COMP_EPSILON;

			const aOwner = movements[a.movement_i];
			const isLeadOutEnd = aOwner
				&& Math.abs(a.X - aOwner.X) < COMP_EPSILON
				&& Math.abs(a.Y - aOwner.Y) < COMP_EPSILON
				&& Math.abs(a.Z - aOwner.Z) < COMP_EPSILON
				&& a.movement_i !== b.movement_i;

			if (isLeadInStart || isLeadOutEnd) continue;

			positions.push(a.X, a.Y, a.Z, b.X, b.Y, b.Z);
		}

		if (positions.length === 0) return;

		const geometry = new THREE.BufferGeometry();
		geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

		const dashSize = arrowLength * 0.6;
		const material = new THREE.LineDashedMaterial({
			color: 0xFFA500,
			dashSize: dashSize,
			gapSize: dashSize * 0.6,
			depthTest: false,
			transparent: true,
			opacity: 0.9
		});

		compensatedMesh = new THREE.LineSegments(geometry, material);
		compensatedMesh.computeLineDistances();
		compensatedMesh.renderOrder = 1;
		segmentsGroup.add(compensatedMesh);
	}

	function processGCodeFromEditor() {
		
		clearSceneLines();
		
		const gcode = monacoEditor.getValue();
		
		movements = parseGCode(gcode);

		const positions = [];
		const colorsArray = [];

		const colorFeed = new THREE.Color(colors.feedColor);
		const colorRapid = new THREE.Color(colors.rapidColor);

		cumulativeLengths = new Array(movements.length);
		cumulativeLengths[0] = 0;

		for (let i = 1; i < movements.length; i++) {
			const start = new THREE.Vector3(movements[i - 1].X, movements[i - 1].Y, movements[i - 1].Z);
			const end = new THREE.Vector3(movements[i].X, movements[i].Y, movements[i].Z);
			const isRapid = movements[i].command === 'G0';
			const color = isRapid ? colorRapid : colorFeed;

			positions.push(start.x, start.y, start.z, end.x, end.y, end.z);
			colorsArray.push(color.r, color.g, color.b, color.r, color.g, color.b);

			cumulativeLengths[i] = cumulativeLengths[i - 1] + start.distanceTo(end);
		}

		const geometry = new THREE.BufferGeometry();
		geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
		geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorsArray, 3));

		const material = new THREE.LineBasicMaterial({ vertexColors: true });
		lineSegmentsMesh = new THREE.LineSegments(geometry, material);
		segmentsGroup.add(lineSegmentsMesh);

		arrowLength = getNonEmptySegmentBox().getSize(new THREE.Vector3()).length() * 0.0084;
		const toolheadScale = arrowLength * 2;
		toolheadGroup.scale.set(toolheadScale, toolheadScale, toolheadScale);
		buildArrowheads();
		buildCompensatedMesh(movements.compensated);

		slider.value = 0;
		slider.max = cumulativeLengths[cumulativeLengths.length - 1] || 0;
		slider.step = 'any';
		selectLineSegments(movements.length, movements.length);
		resetCamera();
	}

	function clearSceneLines() {

	}

	function addAxisLines(box) {
		const marginFactor = 0.2;
		const min = box.min;
		const max = box.max;
		const coneSize = box.getSize(new THREE.Vector3()).length() * 0.0168;
		const up = new THREE.Vector3(0, 1, 0);

		const axes = [
			{
				dir: 'x',
				color: 0xff3653,
				start: min.x,
				end: max.x
			},
			{
				dir: 'y',
				color: 0x8adb00,
				start: min.y,
				end: max.y
			},
			{
				dir: 'z',
				color: 0x2c8fff,
				start: min.z,
				end: max.z
			}
		];

		axes.forEach(({ dir, color, start, end }) => {
			const length = end - start;
			const margin = length * marginFactor;

			let from = new THREE.Vector3();
			let to = new THREE.Vector3();
			let axisDir = new THREE.Vector3();

			if (dir === 'x') {
				from.set(start - margin, 0, 0);
				to.set(end + margin, 0, 0);
				axisDir.set(1, 0, 0);
			} else if (dir === 'y') {
				from.set(0, start - margin, 0);
				to.set(0, end + margin, 0);
				axisDir.set(0, 1, 0);
			} else if (dir === 'z') {
				from.set(0, 0, start - margin);
				to.set(0, 0, end + margin);
				axisDir.set(0, 0, 1);
			}

			const material = new THREE.LineBasicMaterial({
				color,
				depthTest: false,
				transparent: true,
				opacity: 0.8
			});

			const geometry = new THREE.BufferGeometry().setFromPoints([from, to]);
			const line = new THREE.Line(geometry, material);
			line.userData.isAxisLine = true;

			scene.add(line);

			const coneGeometry = new THREE.ConeGeometry(coneSize * 0.4, coneSize, 8);
			coneGeometry.translate(0, -coneSize / 2, 0);

			const coneMaterial = new THREE.MeshBasicMaterial({
				color,
				depthTest: false,
				transparent: true,
				opacity: 0.8
			});

			const cone = new THREE.Mesh(coneGeometry, coneMaterial);
			cone.position.copy(to);
			cone.quaternion.setFromUnitVectors(up, axisDir);
			cone.renderOrder = 1;
			cone.userData.isAxisLine = true;

			scene.add(cone);
		});
	}

 function niceStep(rough) {
    const exp = Math.floor(Math.log10(rough));
    const f = rough / Math.pow(10, exp);
    const m = f < 1.5 ? 1 : f < 3 ? 2 : f < 7 ? 5 : 10;
    return m * Math.pow(10, exp);
	}

  function computeGridSteps(box) {
    const size = box.getSize(new THREE.Vector3());
    const extent = Math.max(size.x, size.y, 1) * 2;
    const minorStep = niceStep(extent / 50);   // ~50 minor cells across
    const majorStep = minorStep * 10;
    return { extent, minorStep, majorStep };
  }

  function addGridLines(box) {
    const { extent, minorStep, majorStep } = computeGridSteps(box);
    const half = Math.ceil(extent / majorStep) * majorStep;
    const z = 0;

    const minor = new THREE.GridHelper(half * 2, (half * 2) / minorStep,
        colors.gridMinor, colors.gridMinor);
    const major = new THREE.GridHelper(half * 2, (half * 2) / majorStep,
        colors.gridMajor, colors.gridMajor);

    [minor, major].forEach(g => {
        g.rotation.x = Math.PI / 2;                    // XZ → XY
        g.position.set(0, 0, z);
        g.material.transparent = true;
        g.material.opacity = 0.4;
        g.material.depthWrite = false;
        g.renderOrder = -1;                             // behind toolpath
        g.userData.isGridLine = true;
        scene.add(g);
    });
  }

  function formatTickValue(v, majorStep) {
    const decimals = Math.max(0, -Math.floor(Math.log10(majorStep)));
    return v.toFixed(decimals);
  }

  // Hand-drafted single-stroke glyphs in the spirit of Hershey simplex.
  // Cell: 0..width across, 0..20 baseline-to-top. Each glyph is a list of
  // sub-strokes (pen-up between sub-strokes); each sub-stroke is a polyline.
  const STROKE_GLYPHS = {
    '0': { width: 14, strokes: [
      [[7,20],[12,18],[14,14],[14,6],[12,2],[7,0],[2,2],[0,6],[0,14],[2,18],[7,20]],
    ]},
    '1': { width: 12, strokes: [
      [[3,15],[7,20],[7,0]],
      [[2,0],[12,0]],
    ]},
    '2': { width: 14, strokes: [
      [[1,15],[3,18],[7,20],[11,20],[13,18],[14,15],[14,12],[12,9],[1,0],[14,0]],
    ]},
    '3': { width: 14, strokes: [
      [[1,18],[4,20],[10,20],[13,18],[13,14],[11,11],[7,11]],
      [[7,11],[11,11],[13,8],[13,3],[10,0],[4,0],[1,3]],
    ]},
    '4': { width: 14, strokes: [
      [[12,20],[0,8],[14,8]],
      [[12,20],[12,0]],
    ]},
    '5': { width: 14, strokes: [
      [[13,20],[2,20],[1,12],[3,13],[7,14],[11,14],[14,11],[14,6],[12,1],[8,0],[4,1],[1,3]],
    ]},
    '6': { width: 14, strokes: [
      [[13,16],[9,20],[5,18],[2,14],[0,8],[0,4],[2,1],[6,0],[10,1],[13,4],[13,8],[10,11],[6,11],[2,9],[0,6]],
    ]},
    '7': { width: 14, strokes: [
      [[14,20],[5,0]],
      [[1,20],[14,20]],
    ]},
    '8': { width: 14, strokes: [
      [[5,20],[2,18],[1,15],[2,12],[5,11],[10,11],[13,12],[14,15],[13,18],[10,20],[5,20]],
      [[5,11],[2,9],[1,5],[2,2],[5,0],[10,0],[13,2],[14,5],[13,9],[10,11]],
    ]},
    '9': { width: 14, strokes: [
      [[14,13],[12,15],[8,15],[4,13],[1,11],[1,8],[3,5],[6,4],[10,4],[13,5],[14,8]],
      [[14,13],[13,5],[12,2],[10,0],[7,0],[3,2]],
    ]},
    '.': { width: 4, strokes: [
      [[1,1],[3,1],[3,2],[1,2],[1,1]],
    ]},
    '-': { width: 14, strokes: [
      [[2,10],[12,10]],
    ]},
  };
  const STROKE_GLYPH_HEIGHT = 20;
  const STROKE_KERN = 3;

  function makeStrokeText(text, scale, colorHex) {
    const positions = [];
    let cursor = 0;
    for (const ch of text) {
      const glyph = STROKE_GLYPHS[ch];
      if (!glyph) { cursor += 12 + STROKE_KERN; continue; }
      for (const stroke of glyph.strokes) {
        for (let i = 0; i < stroke.length - 1; i++) {
          const a = stroke[i];
          const b = stroke[i + 1];
          positions.push(
            (a[0] + cursor) * scale, a[1] * scale, 0,
            (b[0] + cursor) * scale, b[1] * scale, 0
          );
        }
      }
      cursor += glyph.width + STROKE_KERN;
    }
    const totalWidth = Math.max(0, cursor - STROKE_KERN) * scale;
    const totalHeight = STROKE_GLYPH_HEIGHT * scale;

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const material = new THREE.LineBasicMaterial({
      color: colorHex,
      transparent: true,
      opacity: 0.9,
      depthTest: false,
    });
    const lines = new THREE.LineSegments(geometry, material);
    lines.renderOrder = 1;
    return { object: lines, width: totalWidth, height: totalHeight };
  }

  function addAxisTicks(box) {
    const marginFactor = 0.2;
    const { majorStep: xyMajorStep } = computeGridSteps(box);
    const zRange = Math.max(box.max.z - box.min.z, 0.01);
    const zMajorStep = niceStep(zRange / 5);

    const axisDefs = [
      { dir: 'x', color: 0xff3653, start: box.min.x, end: box.max.x, majorStep: xyMajorStep },
      { dir: 'y', color: 0x8adb00, start: box.min.y, end: box.max.y, majorStep: xyMajorStep },
      { dir: 'z', color: 0x2c8fff, start: box.min.z, end: box.max.z, majorStep: zMajorStep },
    ];

    axisDefs.forEach(({ dir, color, start, end, majorStep }) => {
      if (!isFinite(majorStep) || majorStep <= 0) return;

      const textHeight = majorStep * 0.10;
      const textScale = textHeight / STROKE_GLYPH_HEIGHT;
      const gap = majorStep * 0.025;
      const tickLen = majorStep * 0.04;

      const length = end - start;
      const margin = length * marginFactor;
      const lo = start - margin;
      const hi = end + margin;
      const firstK = Math.ceil(lo / majorStep);
      const lastK = Math.floor(hi / majorStep);

      const tickMat = new THREE.LineBasicMaterial({
        color,
        depthTest: false,
        transparent: true,
        opacity: 0.8,
      });

      for (let k = firstK; k <= lastK; k++) {
        if (k === 0) continue;
        const v = k * majorStep;

        const { object: label, width: lw, height: lh } =
          makeStrokeText(formatTickValue(v, majorStep), textScale, color);

        let p1, p2;
        if (dir === 'x') {
          p1 = new THREE.Vector3(v, -tickLen, 0);
          p2 = new THREE.Vector3(v, 0, 0);
          label.position.set(v - lw / 2, -tickLen - gap - lh, 0);
        } else if (dir === 'y') {
          p1 = new THREE.Vector3(-tickLen, v, 0);
          p2 = new THREE.Vector3(0, v, 0);
          label.position.set(-tickLen - gap - lw, v - lh / 2, 0);
        } else { // 'z' — tick and label in the XZ plane, on -X side of Z axis
          p1 = new THREE.Vector3(-tickLen, 0, v);
          p2 = new THREE.Vector3(0, 0, v);
          label.rotation.x = Math.PI / 2;
          label.position.set(-tickLen - gap - lw, 0, v - lh / 2);
        }

        const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        const tickLine = new THREE.Line(geom, tickMat);
        tickLine.userData.isAxisLine = true;
        scene.add(tickLine);

        label.userData.isAxisLine = true;
        scene.add(label);
      }
    });
  }

	let currentSelection = { startIdx: 0, endIdx: -1 };

	const PLANE_LABELS = { 'G17': 'G17 X-Y', 'G18': 'G18 Z-X', 'G19': 'G19 Y-Z' };

	const CYCLE_MOTION_LABELS = {

		'G81': 'G81 drill',
		'G82': 'G82 drill+dwell',
		'G83': 'G83 peck',
	};
	const RETURN_LEVEL_LABELS = { 'G98': 'G98 initial', 'G99': 'G99 R-level' };

	function updateWcsPanel(wcsMap) {
		const panel = document.getElementById('wcsPanel');
		const tbody = document.getElementById('wcsTableBody');
		const entries = Object.entries(wcsMap || {});
		if (entries.length === 0) {
			panel.style.display = 'none';
			tbody.innerHTML = '';
			return;
		}
		panel.style.display = '';
		tbody.innerHTML = '';
		for (const [code, origin] of entries) {
			const tr = document.createElement('tr');
			const x = ((origin && origin.X) ?? 0).toFixed(3);
			const y = ((origin && origin.Y) ?? 0).toFixed(3);
			const z = ((origin && origin.Z) ?? 0).toFixed(3);
			const a = ((origin && origin.A) ?? 0).toFixed(3);
			tr.innerHTML = `<td>${code}</td><td>${x}</td><td>${y}</td><td>${z}</td><td>${a}</td>`;
			tbody.appendChild(tr);
		}
	}

	function updateToolsPanel(tools) {
		const panel = document.getElementById('toolsPanel');
		const tbody = document.getElementById('toolsTableBody');
		const entries = Object.entries(tools || {});
		if (entries.length === 0) {
			panel.style.display = 'none';
			tbody.innerHTML = '';
			return;
		}
		panel.style.display = '';
		tbody.innerHTML = '';
		for (const [num, info] of entries) {
			const tr = document.createElement('tr');
			const radius = (info && info.r) ?? 0;
			const length = (info && info.length) ?? 0;
			tr.innerHTML = `<td>${num}</td><td>${radius.toFixed(3)}</td><td>${length.toFixed(3)}</td>`;
			tbody.appendChild(tr);
		}
	}

	function selectLineSegments(startIdx, endIdx) {
		currentSelection = { startIdx, endIdx };
		if (!lineSegmentsMesh) return;

		const colorAttr = lineSegmentsMesh.geometry.attributes.color;
		const color = new THREE.Color();

		for (let i = 0; i < movements.length - 1; i++) {
			const segmentIndex = i;
			const isSelected = segmentIndex >= startIdx && segmentIndex <= endIdx;
			const isAfter = segmentIndex > endIdx;

			const isRapid = movements[i + 1].command === 'G0';
			let baseColor = isRapid ? colors.rapidColor : colors.feedColor;

			if (isSelected) {
				color.setHex(colors.selectedColor);
			} else {
				if (isAfter) {
					color.setHex(colors.afterSelColor);
				}
				 else {
					color.setHex(baseColor);
				}
			}

			const vi = segmentIndex * 2;
			colorAttr.setXYZ(vi, color.r, color.g, color.b);
			colorAttr.setXYZ(vi + 1, color.r, color.g, color.b);
		}

		colorAttr.needsUpdate = true;

		if (arrowMesh) {
			const arrowColor = new THREE.Color();
			for (let a = 0; a < arrowSegmentIndices.length; a++) {
				const segmentIndex = arrowSegmentIndices[a];
				const isSelected = segmentIndex >= startIdx && segmentIndex <= endIdx;
				const isAfter = segmentIndex > endIdx;

				if (isSelected) {
					arrowColor.setHex(colors.selectedColor);
				} else if (isAfter) {
					arrowColor.setHex(colors.afterSelColor);
				} else {
					arrowColor.setHex(colors.feedColor);
				}
				arrowMesh.setColorAt(a, arrowColor);
			}
			arrowMesh.instanceColor.needsUpdate = true;
		}

		if (startIdx < movements.length - 1) {
			const startPos = new THREE.Vector3(movements[startIdx].X, movements[startIdx].Y, movements[startIdx].Z);
			const endPos = new THREE.Vector3(movements[endIdx + 1].X, movements[endIdx + 1].Y, movements[endIdx + 1].Z);

			startMarker.position.copy(startPos);
			endMarker.position.copy(endPos);

			startMarker.visible = true;
			endMarker.visible = true;

			const sliderValue = parseFloat(slider.value);
			const totalLength = cumulativeLengths[cumulativeLengths.length - 1] || 0;
			let toolX, toolY, toolZ, toolA;
			let compToolX, compToolY, compToolZ;
			let circleRadius = 0;

			if (cumulativeLengths.length >= 2 && sliderValue > 0 && sliderValue <= totalLength) {
				const segIdx = sliderValueToSegmentIndex(sliderValue);
				const segStart = cumulativeLengths[segIdx];
				const segEnd = cumulativeLengths[segIdx + 1];
				const segLen = segEnd - segStart;
				const t = segLen > 0 ? (sliderValue - segStart) / segLen : 0;
				const a = movements[segIdx];
				const b = movements[segIdx + 1];
				toolX = a.X + (b.X - a.X) * t;
				toolY = a.Y + (b.Y - a.Y) * t;
				toolZ = a.Z + (b.Z - a.Z) * t;
				toolA = (a.A ?? 0) + ((b.A ?? 0) - (a.A ?? 0)) * t;
				toolheadGroup.position.set(toolX, toolY, toolZ);
				toolheadGroup.visible = true;

				compToolX = toolX;
				compToolY = toolY;
				compToolZ = toolZ;
				const compensated = movements.compensated;
				if (compensated && compensated.length > 0) {
					const rangeStart = b.compIdx;
					const rangeEnd = (segIdx + 2 < movements.length)
						? movements[segIdx + 2].compIdx
						: compensated.length;
					if (rangeEnd > rangeStart) {
						let cStart;
						if (rangeEnd - rangeStart >= 2) {
							cStart = compensated[rangeStart];
						} else if (rangeStart > 0) {
							cStart = compensated[rangeStart - 1];
						} else {
							cStart = compensated[rangeStart];
						}
						const cEnd = compensated[rangeEnd - 1];
						compToolX = cStart.X + (cEnd.X - cStart.X) * t;
						compToolY = cStart.Y + (cEnd.Y - cStart.Y) * t;
						compToolZ = cStart.Z + (cEnd.Z - cStart.Z) * t;
						circleRadius = radiusForCompState(b.state) || radiusForCompState(a.state);
					}
				}
			} else {
				toolX = endPos.x;
				toolY = endPos.y;
				toolZ = endPos.z;
				toolA = movements[endIdx + 1].A ?? 0;
				toolheadGroup.visible = false;
				compToolX = toolX;
				compToolY = toolY;
				compToolZ = toolZ;
			}

			document.getElementById('posX').textContent = toolX.toFixed(3);
			document.getElementById('posY').textContent = toolY.toFixed(3);
			document.getElementById('posZ').textContent = toolZ.toFixed(3);
			document.getElementById('posA').textContent = toolA.toFixed(3);
			const mvState = movements[endIdx + 1].state;
			document.getElementById('feedrate').textContent = mvState.feedrate ?? 0;
			document.getElementById('spindle').textContent = mvState.spindleOn ? (mvState.spindleSpeed ?? 0) : 0;
			document.getElementById('planeText').textContent = PLANE_LABELS[mvState.plane] ?? mvState.plane;
			document.getElementById('unitsText').textContent = mvState.units;
			document.getElementById('motionText').textContent = MOTION_LABELS[mvState.motion] ?? mvState.motion;
			document.getElementById('motionModeText').textContent = MOTION_MODE_LABELS[mvState.motionMode] ?? mvState.motionMode;
			document.getElementById('wcsText').textContent = mvState.activeWcs;
			document.getElementById('cycleMotionText').textContent = CYCLE_MOTION_LABELS[mvState.cycleMotion] ?? mvState.cycleMotion;
			document.getElementById('returnLevelText').textContent = RETURN_LEVEL_LABELS[mvState.returnLevel] ?? mvState.returnLevel;
			document.getElementById('spindleStateText').textContent = mvState.spindleOn ? 'On' : 'Off';
			document.getElementById('coolantText').textContent = mvState.coolantOn ? 'On' : 'Off';
			const radiusLabel = RADIUS_COMP_LABELS[mvState.radiusComp] ?? mvState.radiusComp;
			const dSuffix = mvState.radiusComp !== 'G40' && mvState.radiusCompTool != null
				? ` D${mvState.radiusCompTool}`
				: '';
			document.getElementById('radiusCompText').textContent = radiusLabel + dSuffix;
			updateWcsPanel(mvState.wcs);
			updateToolsPanel(mvState.tools);

			if (toolheadGroup.visible) {
				updateCutterCompCircle(compToolX, compToolY, compToolZ, circleRadius);
			} else {
				cutterCompCircle.visible = false;
			}

		} else {
			startMarker.visible = false;
			endMarker.visible = false;
			toolheadGroup.visible = false;
			cutterCompCircle.visible = false;

			document.getElementById('posX').textContent = (0).toFixed(3);
			document.getElementById('posY').textContent = (0).toFixed(3);
			document.getElementById('posZ').textContent = (0).toFixed(3);
			document.getElementById('posA').textContent = (0).toFixed(3);
			document.getElementById('feedrate').textContent = 0;
			document.getElementById('spindle').textContent = 0;
			document.getElementById('planeText').textContent = PLANE_LABELS['G17'];
			document.getElementById('unitsText').textContent = 'mm';
			document.getElementById('motionText').textContent = MOTION_LABELS['G0'];
			document.getElementById('motionModeText').textContent = MOTION_MODE_LABELS['G90'];
			document.getElementById('wcsText').textContent = 'G54';
			document.getElementById('cycleMotionText').textContent = CYCLE_MOTION_LABELS['G80'];
			document.getElementById('returnLevelText').textContent = RETURN_LEVEL_LABELS['G98'];
			document.getElementById('spindleStateText').textContent = 'Off';
			document.getElementById('coolantText').textContent = 'Off';
			document.getElementById('radiusCompText').textContent = RADIUS_COMP_LABELS['G40'];
			updateWcsPanel({});
			updateToolsPanel({});
		}
	}
		
	function getSegmentStartPosition(segment) {
		const posAttr = segment.geometry.attributes.position;
		return new THREE.Vector3().fromArray(posAttr.array, 0);
	}

	function getSegmentEndPosition(segment) {
		const posAttr = segment.geometry.attributes.position;
		const lastIndex = posAttr.count - 1;
		return new THREE.Vector3().fromArray(posAttr.array, lastIndex * 3);
	}

	let colors = {
		afterSelColor: 0xA6A6A6,
	};

	const toggleTheme = document.getElementById('toggleTheme');
	const savedTheme = localStorage.getItem('theme');
	const isLight = savedTheme ? savedTheme === 'light' : toggleTheme.checked;
	updateColorsForTheme(!isLight);

	const markerMaterial = new THREE.SpriteMaterial({
		color: colors.selectedColor,
		transparent: true,
		opacity: 1.0,
		depthTest: false,
		sizeAttenuation: true
	});
	const startMarker = new THREE.Sprite(markerMaterial.clone());
	const endMarker = new THREE.Sprite(markerMaterial.clone());
	scene.add(startMarker);
	scene.add(endMarker);
	startMarker.visible = false;
	endMarker.visible = false;

	const toolheadGroup = new THREE.Group();
	const toolheadConeGeom = new THREE.ConeGeometry(0.4, 1, 8);
	toolheadConeGeom.translate(0, -0.5, 0);
	toolheadConeGeom.rotateX(-Math.PI / 2);
	const toolheadConeMat = new THREE.MeshBasicMaterial({
		color: 0xFFA500,
		depthTest: false,
		transparent: true,
		opacity: 1.0
	});
	const toolheadCone = new THREE.Mesh(toolheadConeGeom, toolheadConeMat);
	toolheadCone.renderOrder = 2;

	const toolheadTailGeom = new THREE.BufferGeometry().setFromPoints([
		new THREE.Vector3(0, 0, 1),
		new THREE.Vector3(0, 0, 3)
	]);
	const toolheadTailMat = new THREE.LineBasicMaterial({
		color: 0xFFA500,
		depthTest: false,
		transparent: true,
		opacity: 1.0
	});
	const toolheadTail = new THREE.Line(toolheadTailGeom, toolheadTailMat);
	toolheadTail.renderOrder = 2;

	toolheadGroup.add(toolheadCone);
	toolheadGroup.add(toolheadTail);
	toolheadGroup.visible = false;
	scene.add(toolheadGroup);

	const cutterCompCircleSegments = 64;
	const cutterCompCirclePoints = [];
	for (let i = 0; i <= cutterCompCircleSegments; i++) {
		const theta = (i / cutterCompCircleSegments) * Math.PI * 2;
		cutterCompCirclePoints.push(new THREE.Vector3(Math.cos(theta), Math.sin(theta), 0));
	}
	const cutterCompCircleGeom = new THREE.BufferGeometry().setFromPoints(cutterCompCirclePoints);
	const cutterCompCircleMat = new THREE.LineBasicMaterial({
		color: 0xFFA500,
		depthTest: false,
		transparent: true,
		opacity: 1.0
	});
	const cutterCompCircle = new THREE.Line(cutterCompCircleGeom, cutterCompCircleMat);
	cutterCompCircle.renderOrder = 2;
	cutterCompCircle.visible = false;
	scene.add(cutterCompCircle);

	function updateCutterCompCircle(x, y, z, radius) {
		if (!radius || radius <= 0) {
			cutterCompCircle.visible = false;
			return;
		}
		cutterCompCircle.position.set(x, y, z);
		cutterCompCircle.scale.set(radius, radius, 1);
		cutterCompCircle.visible = true;
	}

	function radiusForCompState(state) {
		if (!state) return 0;
		if (state.radiusComp !== 'G41' && state.radiusComp !== 'G42') return 0;
		if (state.radiusCompTool == null || !state.tools) return 0;
		const tool = state.tools[state.radiusCompTool];
		return tool && tool.r ? tool.r : 0;
	}

	function updateColorsForTheme(isLight) {
		if (isLight) {
			colors.selectedColor = 0x000000;
			colors.feedColor = 0x000080;
			colors.rapidColor = 0xFF0000;
			colors.gridMinor = 0xCCCCCC;
			colors.gridMajor = 0x888888;
		} else {
			colors.selectedColor = 0xFFFFFF;
			colors.feedColor = 0x39FF14;
			colors.rapidColor = 0xFF0000;
			colors.gridMinor = 0x444444;
			colors.gridMajor = 0x888888;
		}
	}

	function applyTheme(isLight) {
		toggleTheme.checked = isLight;
		document.body.classList.toggle('dark', !isLight);
		document.body.classList.toggle('light', isLight);
		setViewerBackground();
		updateColorsForTheme(!isLight);

		startMarker.material.color.set(colors.selectedColor);
		endMarker.material.color.set(colors.selectedColor);

		rebuildOverlaysForTheme();

		if (monacoEditor) {
			monaco.editor.setTheme(isLight ? 'vs-dark' : 'vs-light');
		}
	}

	function rebuildOverlaysForTheme() {
		const existing = [];
		let hadAxes = false;
		scene.traverse(child => {
			if (child.userData.isGridLine || child.userData.isAxisLine) existing.push(child);
			if (child.userData.isAxisLine) hadAxes = true;
		});

		existing.forEach(obj => {
			scene.remove(obj);
			if (obj.geometry) obj.geometry.dispose();
			if (obj.material) {
				if (obj.material.map) obj.material.map.dispose();
				obj.material.dispose();
			}
		});

		const box = getNonEmptySegmentBox();
		if (hadAxes) {
			addAxisLines(box);
			addAxisTicks(box);
		}
		addGridLines(box);
	}

	applyTheme(isLight);

	toggleTheme.addEventListener('change', function () {
		const isLight = this.checked;
		localStorage.setItem('theme', isLight ? 'light' : 'dark');
		applyTheme(isLight);
		selectLineSegments(currentSelection.startIdx, currentSelection.endIdx);
	});
	
	function animate() {
		requestAnimationFrame(animate);
		controls.update();
		
		startMarker.scale.set(size * 0.01 / camera.zoom, size * 0.01 / camera.zoom, 1);
		endMarker.scale.set(size * 0.01 / camera.zoom, size * 0.01 / camera.zoom, 1);
		
		renderer.render(scene, camera);
		gizmo.render();
	}

	resetCamera();

	animate();
	
  </script>
</body>
</html>
